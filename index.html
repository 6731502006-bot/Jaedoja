<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- ✅ สำคัญสำหรับมือถือ -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLOWER CONCERT LOGIN</title>

<style>

body{
  font-family: Arial;
  background: #000;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:20px;
  overflow:hidden;
}

.ticket{
  width:350px;
  max-width:90%;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
  position:relative;
}

.ticket::before,
.ticket::after{
  content:"";
  position:absolute;
  width:30px;
  height:30px;
  background:#000;
  border-radius:50%;
  top:50%;
  transform:translateY(-50%);
}

.ticket::before{ left:-15px; }
.ticket::after{ right:-15px; }

h1{
  text-align:center;
  font-size:18px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:1px solid #ccc;
  border-radius:10px;
  box-sizing:border-box;
  font-size:16px;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
}

.email{ background:#ffb6c1; }
.fb{ background:#3b5998; color:white; }
.phone{ background:#90ee90; }
.skip{ background:#ddd; }

.error{
  color:red;
  font-size:12px;
  text-align:center;
  display:none;
}

</style>
</head>

<body>

<div class="ticket">

<h1>🌸 FLOWER CONCERT</h1>

<input id="email" placeholder="Email">
<input id="PassWord" placeholder="Password">

<div class="error" id="error">
❌ Please fill at least Email or Password
</div>

<button class="skip" onclick="Confirm()">Confirm </button>
<button class="email" onclick="login('email')">Login with Email</button>
<button class="fb" onclick="fakeFB()">Login with Facebook</button>
<button class="phone" onclick="login('phone')">Login with Phone</button>

</div>

<script>

function validate(){
  let email=document.getElementById("email").value;
  let password=document.getElementById("PassWord").value;
  return email.trim()!=="" || password.trim()!=="";
}

function login(type){

  if(!validate()){
    document.getElementById("error").style.display="block";
    return;
  }

  localStorage.setItem("loginType",type);
  localStorage.setItem("email",document.getElementById("email").value);
  localStorage.setItem("password",document.getElementById("PassWord").value);

  location.href="seat.html";
}

/* ✅ Confirm (skip login แต่ต้องกรอกก่อน) */
function Confirm(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("PassWord").value;

  if(email.trim() === "" || password.trim() === ""){
    document.getElementById("error").style.display="block";
    return;
  }

  localStorage.setItem("loginType","guest");
  location.href="seat.html";
}

/* 🔵 fake facebook login */
function fakeFB(){
  alert("🔵 Facebook Login...\nRedirecting to Facebook");

  setTimeout(()=>{
    login("facebook");
  },1000);
}

</script>

</body>
</html>
